<div class="dashboard-container">
  <app-sidebar></app-sidebar>

  <div class="main">
    <app-topbar (newClaim)="onNewClaim()"></app-topbar>

    <div class="content">

      <!-- Charts row -->
      <div class="charts-grid">
        <!-- Bar chart -->
        <div class="card chart-card">
          <div class="card-head">
            <h3>Performance des agents</h3>
            <span class="card-head-right">Bar chart</span>
          </div>

          <div class="chart-wrapper">
            <canvas
              baseChart
              [data]="barChartData"
              [options]="barChartOptions"
              [type]="barChartType">
            </canvas>
          </div>
        </div>

        <!-- Doughnut chart -->
        <div class="card chart-card">
          <div class="card-head">
            <h3>Répartition des décisions</h3>
            <span class="card-head-right">Doughnut chart</span>
          </div>

          <div class="chart-wrapper doughnut-wrapper">
            <canvas
              baseChart
              [data]="doughnutChartData"
              [options]="doughnutChartOptions"
              [type]="doughnutChartType">
            </canvas>
          </div>
        </div>
      </div>

      <!-- Line chart -->
      <div class="card chart-card">
        <div class="card-head">
          <h3>Évolution des scores de confiance</h3>
          <span class="card-head-right">Line chart</span>
        </div>

        <div class="chart-wrapper">
          <canvas
            baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            [type]="lineChartType">
          </canvas>
        </div>
      </div>

      <!-- Seuil -->
      <div class="card threshold-card">
        <div class="threshold-section">
          <div class="threshold-label">Seuil de confiance minimal</div>
          <div class="threshold-bar-container">
            <div class="threshold-bar">
              <div class="threshold-fill" [style.width.%]="threshold.value"></div>
            </div>
            <span class="threshold-value">{{ threshold.value }}%</span>
          </div>
          <div class="threshold-message">{{ threshold.message }}</div>
        </div>
      </div>

    </div>
  </div>
</div>
