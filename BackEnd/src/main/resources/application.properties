# Nom de l'application
spring.application.name=InsureFlow_Back

# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/insureFlow_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Serveur
server.port=8080

#  Ollama via Spring AI
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:7b
spring.ai.ollama.embedding.model=nomic-embed-text
# Milvus
milvus.host=localhost
milvus.port=19530
milvus.collection-name=sinistre
milvus.dimension=768
logging.level.io.milvus.client.AbstractMilvusGrpcClient=OFF
logging.level.io.milvus.client.MilvusServiceClient=OFF

# Ollama via LangChain4j (custom keys)
ollama.base-url=http://localhost:11434
ollama.chat-model=qwen2.5:7b
ollama.embedding-model=nomic-embed-text
ollama.vision-model=qwen2.5vl:7b

# Augmenter la taille des fichiers uploadés
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB